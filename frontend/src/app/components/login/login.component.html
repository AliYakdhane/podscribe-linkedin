<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo-icon" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="15" y="4" width="10" height="18" rx="5" stroke="currentColor" stroke-width="2"/>
          <path d="M12 22v2a8 8 0 0 0 16 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 32v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 36h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="login-logo">Podcast AI Studio</span>
      <p class="login-tagline">Sign in to your workspace</p>
    </div>
    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          id="username"
          type="text"
          class="form-input"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
        />
      </div>
      @if (error) {
        <div class="alert-error" role="alert">{{ error }}</div>
      }
      <button type="submit" class="btn-submit" [disabled]="loading">
        @if (loading) {
          <span class="btn-spinner"></span>
          Signing in…
        } @else {
          Sign in
        }
      </button>
    </form>
  </div>
</div>
